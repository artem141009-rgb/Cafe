<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Bonjour Café</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="header-container">
            <div class="logo" onclick="window.location.href='index.html'" style="cursor: pointer;">
                <span class="brand-name">Bonjour Café</span>
            </div>
            <a href="index.html" class="back-to-shop"><i class="fa fa-arrow-left"></i> Back to Menu</a>
        </div>
    </header>

    <main class="checkout-container">
        <div class="checkout-grid">
            <div class="checkout-form-container">
                <h2>Delivery Details / Registration</h2>
                <form id="order-form" onsubmit="submitOrder(event)">
                    <div class="form-group">
                        <label for="name">Full Name *</label>
                        <input type="text" id="name" required placeholder="Enter your name">
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">Phone Number *</label>
                            <input type="tel" id="phone" required placeholder="+373 XX XXX XXX">
                        </div>
                        <div class="form-group">
                            <label for="email">Email (Optional)</label>
                            <input type="email" id="email" placeholder="for order updates">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Delivery Option *</label>
                        <div class="delivery-options">
                            <label class="radio-label">
                                <input type="radio" name="delivery-type" value="delivery" checked onclick="toggleAddressField(true)">
                                <span>Delivery</span>
                            </label>
                            <label class="radio-label">
                                <input type="radio" name="delivery-type" value="pickup" onclick="toggleAddressField(false)">
                                <span>Self-pickup</span>
                            </label>
                        </div>
                    </div>
                    <div class="form-group" id="address-group">
                        <label for="address">Delivery Address *</label>
                        <input type="text" id="address" placeholder="Street, building, apartment">
                    </div>
                    <button type="submit" class="place-order-btn">Confirm & Order</button>
                </form>
            </div>

            <div class="checkout-summary-box">
                <h3>Order Summary</h3>
                <div id="checkout-items-list">
                    </div>
                <div class="checkout-totals">
                    <div class="total-row">
                        <span>Items Total:</span>
                        <span id="summary-subtotal">0 MDL</span>
                    </div>
                    <div class="total-row delivery-cost">
                        <span>Delivery:</span>
                        <span id="summary-delivery">40 MDL</span>
                    </div>
                    <hr>
                    <div class="total-row final-total">
                        <span>Total:</span>
                        <span id="summary-total">0 MDL</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
